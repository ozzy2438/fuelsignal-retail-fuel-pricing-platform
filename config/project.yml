# FuelSignal Project Configuration
# This file defines global project settings used across all pipeline stages.

project:
  name: "FuelSignal"
  description: "Retail Fuel Pricing & Price-Cycle Forecasting Platform"
  version: "0.1.0"
  type: "public_portfolio_project"
  author: "Osman Orka"
  repository: "https://github.com/ozzy2438/fuelsignal-retail-fuel-pricing-platform"

platform:
  provider: "databricks"
  runtime: "free_edition"
  compute: "serverless_or_cluster"
  storage_format: "delta"

architecture:
  catalog: "main"  # May need adjustment based on workspace capabilities
  schema_prefix: "fuelsignal"
  schemas:
    bronze: "fuelsignal_bronze"
    silver: "fuelsignal_silver"
    gold: "fuelsignal_gold"
    monitoring: "fuelsignal_monitoring"

geography:
  country: "Australia"
  state: "NSW"
  target_stations: 40
  competitor_radius_km: 5.0

pricing:
  currency: "AUD"
  unit: "cents_per_litre"
  plausible_min_cpl: 80.0
  plausible_max_cpl: 300.0
  tgp_plausible_min_cpl: 60.0
  tgp_plausible_max_cpl: 250.0

jump_detection:
  # Price jump = increase of at least this many cpl from the previous day's market
  # median (fuel_type-level, statewide). Empirically chosen 2026-07-18 via sensitivity
  # analysis over the live 18-month archive (candidates 3/5/7/10/15 cpl) - 7.0 cpl gives
  # a sparse, distinct event rate (~6-8% of days across U91/E10/P98/P95) with median
  # triggered magnitude ~10-11 cpl, clearly separated from day-to-day noise
  # (stddev ~5.2 cpl). See docs/jump-label-definition.md for the full sensitivity table
  # and reasoning. Previous default (5.0) is now the "candidates" list's floor, not the
  # chosen threshold.
  min_jump_cpl: 7.0
  candidate_jump_thresholds_cpl: [3.0, 5.0, 7.0, 10.0, 15.0]
  # Alternative: percentage-based (not currently used by the Gold pipeline)
  min_jump_pct: 3.0
  # Forecast horizon in hours
  forecast_horizon_hours: 48

pipeline:
  default_full_refresh: false
  max_retry_attempts: 3
  retry_delay_seconds: 30
  request_timeout_seconds: 60
  batch_size: 10000

modelling:
  # Week 2 Phase 2 (2026-07-18). Fuel types included in the first model iteration -
  # LPG/E85/B20 have too little raw history for a stable jump-label frequency (see
  # docs/jump-label-definition.md) and are deliberately excluded.
  included_fuel_types: ["U91", "E10", "P95", "P98", "DL", "PDL"]
  # Model-eligibility filter (docs/model-eligibility.md has the full empirical basis):
  # a station x fuel_type series must have at least this many gold_station_daily_market
  # observations to be used for training. Chosen empirically: 30 observations excludes
  # 11.8% of the 8,846 candidate series (target-fuel-only) while 60 would exclude 33.2%
  # - 30 is the more defensible floor for a first model iteration given the archive is
  # only 18 months (489 days) long.
  min_observations_per_series: 30
  # A series is also excluded if more than this fraction of its
  # gold_market_cycle_features rows show an implausible >100 cpl 14-day swing (see
  # feature-engineering.md #7). 10% was chosen because it separates a small minority
  # (4.5% of series) of genuinely noisy series from the ~34% of series that have merely
  # ever had one such event, which is too common to treat as disqualifying on its own.
  max_extreme_change_rate: 0.10
  # Walk-forward (expanding-window) validation folds. Never a random split - see
  # docs/validation-methodology.md.
  walk_forward_folds: 4
  walk_forward_min_train_days: 180
  walk_forward_test_days: 60
