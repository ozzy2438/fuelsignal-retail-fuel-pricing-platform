  nsw_fuelcheck_api_reference:
    name: "NSW FuelCheck Live Reference Data API"
    description: "Official live station reference data: code, brand, address, coordinates"
    provider: "NSW Government - Department of Customer Service (OneGov)"
    landing_page: "https://api.nsw.gov.au/Product/Index/22"
    token_url: "https://api.onegov.nsw.gov.au/oauth/client_credential/accesstoken"
    api_base: "https://api.onegov.nsw.gov.au/FuelCheckRefData/v2/fuel/lovs"
    auth_type: "oauth2_client_credentials"
    auth_notes: |
      Requires a registered application at https://api.nsw.gov.au (Fuel API product).
      Credentials are read from FUELCHECK_API_KEY / FUELCHECK_API_SECRET environment
      variables (never committed - see .env.example). Confirmed live flow as of
      2026-07-18:
        1. GET {token_url}?grant_type=client_credentials with an HTTP Basic
           Authorization header (base64 of "key:secret"). Must be GET - the documented
           POST form returns HTTP 200 but silently echoes the request body instead of
           issuing a token.
        2. GET {api_base} with Authorization: Bearer <token>, apikey: <FUELCHECK_API_KEY>,
           transactionid: <uuid4>, requesttimestamp: <dd/MM/yyyy HH:mm:ss> headers.
           Omitting transactionid/requesttimestamp fails with HeadersError.
    data_format: "json"
    frequency: "on_demand"
    coverage:
      geographic: "NSW, Australia"
      temporal: "current_snapshot_only"
      granularity: "station-level"
    fields_expected:
      - code
      - name
      - brand
      - address
      - location.latitude
      - location.longitude
      - state
    notes: |
      Response also includes brands.items and fueltypes.items lookup lists (unused
      by this pipeline today). Verified 2026-07-18: 3323 stations returned, 0 missing
      coordinates, 0 duplicate station codes. This endpoint has no historical depth -
      it is a live snapshot used only to enrich/crosswalk the bulk price history via
      normalized address matching (see src/fuelsignal/silver/station_matching.py).

  aip_terminal_gate_prices:
    name: "AIP Terminal Gate Prices"
    description: "Wholesale terminal gate prices published by the Australian Institute of Petroleum"
    provider: "Australian Institute of Petroleum (AIP)"
    landing_page: "https://www.aip.com.au/pricing/terminal-gate-prices"
    historical_download_page: "https://www.aip.com.au/historical-ulp-and-diesel-tgp-data"
    resolved_download_url: "https://www.aip.com.au/sites/default/files/download-files/2026-07/AIP_TGP_Data_17-Jul-2026.xlsx"
    # TGP data is typically published as structured tables on the page
    data_format: "html_table"
    frequency: "daily"
    coverage:
      geographic: "All Australian capital cities and major terminals"
      temporal: "Rolling historical"
      granularity: "terminal-level, product-level, daily"
    fields_expected:
      - date
      - terminal_city
      - product
      - price_cpl
    notes: |
      TGP data is published on the AIP website.
      May require HTML parsing or structured extraction.
      Products include ULP, PULP, Diesel, E10 etc.
      The single "historical-ulp-and-diesel-tgp-data" workbook (resolved_download_url)
      already contains daily terminal-level data from 2004-01-01 through the current
      date (verified live 2026-07-18: silver_terminal_gate_prices spans 2004-01-01 to
      2026-07-17, 5882 distinct dates). No separate historical backfill is needed for
      this source - the existing monthly re-download already captures full history.

  accc_petrol_cycles:
    name: "ACCC Petrol Price Cycles"
    description: "Information and methodology for petrol price cycle analysis"
    provider: "Australian Competition & Consumer Commission"
    landing_page: "https://www.accc.gov.au/consumers/petrol-and-fuel/petrol-price-cycles"
    data_format: "reference_only"
    frequency: "quarterly_reports"
    usage: "methodology_and_context"
    notes: |
      The ACCC publishes reports on fuel market behaviour.
      Primary use is for understanding cycle methodology and validation.
      Structured data extracts may be available in quarterly monitoring reports.

  nsw_public_holidays:
    name: "NSW Public Holidays"
    description: "Official NSW public holiday dates"
    provider: "NSW Government - Industrial Relations"
    landing_page: "https://www.nsw.gov.au/about-nsw/public-holidays"
    resolved_download_url: "https://www.nsw.gov.au/about-nsw/public-holidays"
    data_format: "html_table"
    frequency: "annual"
    coverage:
      geographic: "NSW, Australia"
      temporal: "Current and upcoming years"
      granularity: "daily"
    fields_expected:
      - date
      - holiday_name
      - state
      - is_national
    notes: |
      Public holidays affect fuel demand patterns.
      Both state and national holidays should be captured.
      Consider using data.gov.au API for structured access.

data_download_rules:
  - "Always use official government or industry body sources"
  - "Never use Kaggle, unofficial GitHub repos, or scraped mirrors"
  - "Record both landing page URL and actual download/API URL"
  - "Include timeout, retry, and error handling in all downloaders"
  - "Preserve raw source artifacts before transformation"
  - "Log retrieval time and source metadata in audit records"
