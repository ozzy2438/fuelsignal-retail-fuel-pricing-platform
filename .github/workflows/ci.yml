name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check src/ tests/ --output-format=github

      - name: Format check with Black
        run: |
          black --check src/ tests/

      - name: Validate YAML configs
        run: |
          python - <<'EOF'
          import yaml
          from pathlib import Path

          for f in Path("config").glob("*.yml"):
              print(f"Validating {f}...")
              yaml.safe_load(f.read_text())
              print("  OK")
          print("All YAML configs valid.")
          EOF

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short -m "not integration"

      - name: Check imports
        run: |
          python -c "from fuelsignal.config import load_project_config, load_sources_config"
          python -c "from fuelsignal.utils import haversine_distance_km, compute_record_hash"
          python -c "from fuelsignal.quality.checks import check_not_null, check_price_bounds"
          python -c "from fuelsignal.ingestion import BaseIngester"
          echo "All imports successful"

      - name: Verify no secrets in codebase
        run: |
          # Check for potential token patterns
          if grep -rn "dapi[0-9a-f]\{32\}" --include="*.py" --include="*.yml" --include="*.md" .; then
            echo "ERROR: Possible Databricks token found in codebase!"
            exit 1
          fi
          echo "No secrets detected."

  config-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install PyYAML
        run: pip install pyyaml
      
      - name: Validate all YAML files
        run: |
          python - <<'EOF'
          import sys
          from pathlib import Path

          import yaml

          errors = []
          for f in Path(".").rglob("*.yml"):
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f"{f}: {e}")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)
          print("All YAML files valid.")
          EOF

      - name: Validate SQL files syntax
        run: |
          python - <<'EOF'
          from pathlib import Path

          for f in Path("sql").rglob("*.sql"):
              content = f.read_text()
              assert len(content) > 10, f"{f} appears empty"
              print(f"  {f}: OK ({len(content)} chars)")
          print("All SQL files have content.")
          EOF
